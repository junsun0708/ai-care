name: children_health_care
description: "Children Health & Care - Modular app for children's health management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management
  flutter_bloc: ^8.1.6
  
  # Navigation
  go_router: ^14.6.2
  
  # Dependency Injection
  get_it: ^8.0.2
  
  # Local storage
  shared_preferences: ^2.3.3
  
  # UI utilities
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true